<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuramoto synchronisation - interactive</title>
<link rel="stylesheet" href="sim.css">
<script src="plotly.min.js" charset="utf-8"></script>
<script src="sim_lib.js"></script>
</head><body>
<header>
  <a class="back" href="index.html">&larr; all simulations</a>
  <h1>Kuramoto oscillators</h1>
  <p>Raise the coupling K past the critical value and watch the phases lock together.</p>
</header>
<div class="wrap">
  <div id="plot"></div>
  <div class="panel" id="panel"><h2>Parameters</h2></div>
</div>
<script>
const plot = document.getElementById('plot');
const panel = document.getElementById('panel');
const { COL, rk4, slider, button, row, note, readout } = SimLib;

let N = 80, K = 2.4, gamma = 0.5, speed = 1.0;
const dt = 0.01;
let theta = [], omega = [], playing = true, raf = null, rOut;

function reset() {
  omega = []; theta = [];
  for (let i = 0; i < N; i++) {
    let w = gamma * Math.tan(Math.PI * (Math.random() - 0.5));   // Lorentzian
    omega.push(Math.max(-4, Math.min(4, w)));
    theta.push((Math.random() * 2 - 1) * Math.PI);
  }
  draw();
}

function f(_, y) {
  let sx = 0, sy = 0;
  for (let i = 0; i < N; i++) { sx += Math.cos(y[i]); sy += Math.sin(y[i]); }
  sx /= N; sy /= N;
  const out = new Array(N);
  for (let i = 0; i < N; i++) out[i] = omega[i] + K * (sy * Math.cos(y[i]) - sx * Math.sin(y[i]));
  return out;
}

function orderParam() {
  let sx = 0, sy = 0;
  for (let i = 0; i < N; i++) { sx += Math.cos(theta[i]); sy += Math.sin(theta[i]); }
  sx /= N; sy /= N;
  return [Math.hypot(sx, sy), Math.atan2(sy, sx)];
}

function draw() {
  const ct = []; for (let a = 0; a <= 60; a++) ct.push(2 * Math.PI * a / 60);
  const circle = { x: ct.map(Math.cos), y: ct.map(Math.sin), mode: 'lines',
                   line: { color: COL.dim, width: 2 }, hoverinfo: 'skip' };
  const dots = { x: theta.map(Math.cos), y: theta.map(Math.sin), mode: 'markers',
    marker: { size: 11, color: omega, colorscale: 'Turbo', cmin: -2, cmax: 2,
              line: { color: 'rgba(0,0,0,0.5)', width: 0.5 },
              colorbar: { title: 'w', x: 1.02, len: 0.7, tickfont: { color: COL.muted } } } };
  const [r, psi] = orderParam();
  const arrow = { x: [0, r * Math.cos(psi)], y: [0, r * Math.sin(psi)], mode: 'lines+markers',
                  line: { color: '#FFFFFF', width: 3 }, marker: { size: [1, 13], color: '#FFFFFF' },
                  hoverinfo: 'skip' };
  const lay = SimLib.layout('Kuramoto synchronisation',
    { uirevision: 'keep', xaxis: { range: [-1.3, 1.3], visible: false },
      yaxis: { range: [-1.3, 1.3], visible: false, scaleanchor: 'x' } });
  Plotly.react(plot, [circle, dots, arrow], lay, SimLib.config);
}

function step() {
  const subs = Math.max(1, Math.round(speed * 4));
  for (let k = 0; k < subs; k++) theta = rk4(f, 0, theta, dt);
  const [r, psi] = orderParam();
  Plotly.restyle(plot, { x: [theta.map(Math.cos), [0, r * Math.cos(psi)]],
                         y: [theta.map(Math.sin), [0, r * Math.sin(psi)]] }, [1, 2]);
  if (rOut) rOut.innerHTML = 'order parameter r = <b>' + r.toFixed(3) + '</b>';
}

function loop() { if (!playing) return; step(); raf = requestAnimationFrame(loop); }
function play() { if (playing) return; playing = true; loop(); }
function pause() { playing = false; if (raf) cancelAnimationFrame(raf); }

slider(panel, { label: 'Oscillators N', min: 10, max: 200, step: 5, value: N, fmt: v => v | 0,
  onInput: v => { N = v | 0; reset(); } });
slider(panel, { label: 'Coupling K', min: 0, max: 5, step: 0.05, value: K,
  onInput: v => { K = v; } });
slider(panel, { label: 'Frequency spread', min: 0.05, max: 2, step: 0.05, value: gamma,
  onInput: v => { gamma = v; reset(); } });
slider(panel, { label: 'Speed', min: 0.3, max: 4, step: 0.1, value: speed, unit: '×',
  onInput: v => { speed = v; } });
row(panel, [button(panel, '▶ Play', play), button(panel, '❚❚ Pause', pause),
            button(panel, '↻ New freqs', reset, 'alt')]);
rOut = readout(panel);
note(panel, 'Critical coupling K_c = 2/(pi g(0)) = 2 x spread for this Lorentzian. Below it r stays near 0; above it the phases clump and r grows.');

SimLib.explain([
  { title: 'What you are looking at', html:
    '<p>N oscillators, each a dot running around the circle at its own natural frequency (colour). The coupling K pulls each one toward the average phase. The white arrow is the order parameter r: its length measures how clumped the phases are, from 0 (scattered) to 1 (locked together).</p>' },
  { title: 'The synchronisation transition', html:
    '<p>With weak coupling the spread of frequencies wins, the dots smear around the circle and r stays near 0. Past a critical coupling K_c the pull wins, a cluster locks and drags in others, and r jumps up. For the Lorentzian spread used here K_c = 2 times the spread.</p>' },
  { title: 'Things to try', html:
    '<ul>' +
    '<li>Start with K below K_c (incoherent), then raise it past the threshold and watch r climb.</li>' +
    '<li>Widen the frequency spread: you now need a larger K to lock, so K_c moves up.</li>' +
    '<li>Increase N: the transition gets sharper and r settles more steadily.</li>' +
    '</ul>' },
  { title: 'Why it matters', html:
    '<p>This is the standard model for spontaneous synchrony: fireflies flashing in unison, pacemaker cells, power-grid generators. The network labs put these same oscillators on a graph instead of an all-to-all crowd.</p>' }
]);

reset(); loop();
</script>
</body></html>

<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rock-Paper-Scissors replicator - interactive</title>
<link rel="stylesheet" href="sim.css">
<script src="plotly.min.js" charset="utf-8"></script>
<script src="sim_lib.js"></script>
</head><body>
<header>
  <a class="back" href="index.html">&larr; all simulations</a>
  <h1>Rock-Paper-Scissors replicator dynamics</h1>
  <p>Slide the payoff parameter: orbit is closed at 0, spirals in if positive, out if negative.</p>
</header>
<div class="wrap">
  <div id="plot"></div>
  <div class="panel" id="panel"><h2>Parameters</h2></div>
</div>
<script>
const plot = document.getElementById('plot');
const panel = document.getElementById('panel');
const { COL, rk4, slider, button, row, note, readout } = SimLib;

let eps = 0.0, speed = 1.0;
const dt = 0.02, trail = 70, STEPS = 5000;
let traj = [], idx = 0, playing = true, raf = null, regOut;
const x0 = [0.42, 0.34, 0.24];

function rhs(_, x) {
  const A = [[0, -1 - eps, 1], [1, 0, -1 - eps], [-1 - eps, 1, 0]];
  const f = [0, 0, 0];
  for (let i = 0; i < 3; i++) { let s = 0; for (let j = 0; j < 3; j++) s += A[i][j] * x[j]; f[i] = s; }
  let avg = 0; for (let i = 0; i < 3; i++) avg += x[i] * f[i];
  return [x[0] * (f[0] - avg), x[1] * (f[1] - avg), x[2] * (f[2] - avg)];
}

function proj(p) { return [p[1] + 0.5 * p[2], (Math.sqrt(3) / 2) * p[2]]; }

function compute() {
  traj = []; let y = x0.slice();
  for (let i = 0; i < STEPS; i++) {
    y = rk4(rhs, 0, y, dt);
    y = y.map(v => Math.max(1e-9, v));
    const tot = y[0] + y[1] + y[2]; y = y.map(v => v / tot);
    traj.push(proj(y));
  }
  idx = 0; draw();
  if (regOut) regOut.innerHTML = 'regime: <b>' +
    (eps > 0.02 ? 'spiral in (stable)' : eps < -0.02 ? 'spiral out (unstable)' : 'closed orbit (neutral)') + '</b>';
}

function draw() {
  const Vp = [[1, 0, 0], [0, 1, 0], [0, 0, 1], [1, 0, 0]].map(proj);
  const tri = { x: Vp.map(p => p[0]), y: Vp.map(p => p[1]), mode: 'lines',
                line: { color: COL.muted, width: 2 }, hoverinfo: 'skip' };
  const path = { x: traj.map(p => p[0]), y: traj.map(p => p[1]), mode: 'lines',
                 line: { color: COL.gold, width: 1 }, opacity: 0.25, hoverinfo: 'skip' };
  const tail = { x: [], y: [], mode: 'lines', line: { color: COL.gold, width: 3 }, hoverinfo: 'skip' };
  const head = { x: [traj[0][0]], y: [traj[0][1]], mode: 'markers',
                 marker: { size: 11, color: COL.gold, line: { color: '#FFFFFF', width: 1 } } };
  const lay = SimLib.layout('RPS on the simplex',
    { uirevision: 'keep', xaxis: { range: [-0.1, 1.1], visible: false },
      yaxis: { range: [-0.12, 1.0], visible: false, scaleanchor: 'x' },
      annotations: [
        { x: 0, y: 0, text: 'Rock', showarrow: false, yshift: -14, font: { color: COL.txt } },
        { x: 1, y: 0, text: 'Paper', showarrow: false, yshift: -14, font: { color: COL.txt } },
        { x: 0.5, y: Math.sqrt(3) / 2, text: 'Scissors', showarrow: false, yshift: 14, font: { color: COL.txt } }] });
  Plotly.react(plot, [tri, path, tail, head], lay, SimLib.config);
}

function step() {
  const adv = Math.max(1, Math.round(speed * 6));
  idx += adv; if (idx >= STEPS) idx = 0;
  const s = Math.max(0, idx - trail);
  Plotly.restyle(plot, { x: [traj.slice(s, idx + 1).map(p => p[0]), [traj[idx][0]]],
                         y: [traj.slice(s, idx + 1).map(p => p[1]), [traj[idx][1]]] }, [2, 3]);
}

function loop() { if (!playing) return; step(); raf = requestAnimationFrame(loop); }
function play() { if (playing) return; playing = true; loop(); }
function pause() { playing = false; if (raf) cancelAnimationFrame(raf); }

slider(panel, { label: 'Payoff epsilon', min: -0.6, max: 0.6, step: 0.02, value: eps, fmt: v => (+v).toFixed(2),
  onInput: v => { eps = v; compute(); } });
slider(panel, { label: 'Speed', min: 0.3, max: 4, step: 0.1, value: speed, unit: '×',
  onInput: v => { speed = v; } });
row(panel, [button(panel, '▶ Play', play), button(panel, '❚❚ Pause', pause)]);
regOut = readout(panel);
note(panel, 'Replicator dynamics on the strategy simplex. epsilon = 0 conserves the orbit; epsilon > 0 makes the centre attracting; epsilon < 0 makes it repelling.');

SimLib.explain([
  { title: 'What you are looking at', html:
    '<p>Three strategies, rock, paper and scissors, played by a large population. The replicator equation says a strategy grows when it does better than the population average. The triangle (simplex) holds every mix of the three; each corner is everyone playing one strategy.</p>' +
    '<p>The dot is the current mix and the gold curve is its orbit over time.</p>' },
  { title: 'The cyclic dominance', html:
    '<p>Rock beats scissors beats paper beats rock, so no strategy ever wins for good. The mix chases its own tail around the central point, where all three are played equally (the Nash equilibrium at 1/3, 1/3, 1/3).</p>' },
  { title: 'What epsilon does', html:
    '<ul>' +
    '<li><b>epsilon = 0</b>: the standard zero-sum game. The orbit is a closed loop and a conserved quantity keeps it from spiralling, a neutral centre.</li>' +
    '<li><b>epsilon &gt; 0</b>: ties pay a little, the centre becomes attracting and the orbit spirals inward to coexistence.</li>' +
    '<li><b>epsilon &lt; 0</b>: the centre repels, the orbit spirals out toward the edges where diversity collapses.</li>' +
    '</ul>' },
  { title: 'Things to try', html:
    '<ul>' +
    '<li>Set epsilon = 0 and watch the orbit close on itself exactly.</li>' +
    '<li>Nudge epsilon just above 0 to see a slow inward spiral, and just below 0 for an outward one.</li>' +
    '</ul>' }
]);

compute(); loop();
</script>
</body></html>
